services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres-db

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: Nihal37307
      POSTGRES_DB: docintelli_rebuild

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: docintelli-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: Nihal
      MINIO_ROOT_PASSWORD: Nihal373707

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  backend:
    build: .

    container_name: docintelli-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - minio

    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
  minio_data: